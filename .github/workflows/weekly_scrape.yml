name: Weekly Competitor Pricing Scraper

on:
  schedule:
    # Every Monday at 07:00 UTC = 08:00 Madrid (CET) / 09:00 Madrid (CEST summer)
    - cron: '0 7 * * 1'

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          JUSTEAT_EMAIL:               ${{ secrets.JUSTEAT_EMAIL }}
          UBEREATS_EMAIL:              ${{ secrets.UBEREATS_EMAIL }}
          UBEREATS_PASSWORD:           ${{ secrets.UBEREATS_PASSWORD }}
          GLOVO_EMAIL:                 ${{ secrets.GLOVO_EMAIL }}
          GLOVO_PASSWORD:              ${{ secrets.GLOVO_PASSWORD }}
          RECIPIENT_EMAIL:             ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_ADDRESS:               ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('Scraper failed — check logs above for details')
