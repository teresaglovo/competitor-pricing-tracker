name: Weekly Competitor Pricing Scraper

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml gspread google-auth

      - name: Run scraper
        env:
          JUSTEAT_EMAIL:               ${{ secrets.JUSTEAT_EMAIL }}
          UBEREATS_EMAIL:              ${{ secrets.UBEREATS_EMAIL }}
          UBEREATS_PASSWORD:           ${{ secrets.UBEREATS_PASSWORD }}
          GLOVO_EMAIL:                 ${{ secrets.GLOVO_EMAIL }}
          GLOVO_PASSWORD:              ${{ secrets.GLOVO_PASSWORD }}
          RECIPIENT_EMAIL:             ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_ADDRESS:               ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py
